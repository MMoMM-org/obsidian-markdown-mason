name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-lint-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check manifest
        run: npm run check:manifest

      - name: Test (includes compliance sweep)
        run: npm test
