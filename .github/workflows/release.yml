name: Release

# Automated, commit-driven releases via semantic-release.
#
# Every push to main is analysed: a `fix:` commit cuts a patch, `feat:` a minor,
# and a `BREAKING CHANGE:` a major. Commits of type chore/ci/docs/test/refactor
# produce NO release. There is no manual tag step — the Conventional Commit
# message is the release trigger, so a release can never be forgotten.
#
# When a release is warranted, semantic-release: computes the version, updates
# CHANGELOG.md, runs `node version-bump.mjs && npm run build` (stamping
# manifest.json + versions.json and producing the production main.js), commits
# those files back to main with `[skip ci]`, tags the commit (no "v" prefix —
# Obsidian convention), and publishes a GitHub Release with main.js,
# manifest.json and styles.css. The bytes are then attested for provenance.
on:
  push:
    branches: [main]

# Required for:
#   contents: write     — create the GitHub Release, push the release commit + tag
#   issues / pull-requests: write — semantic-release success comments
#   id-token: write     — OIDC token for build-provenance attestation
#   attestations: write — store the attestation via actions/attest-build-provenance
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, release, and attest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history so semantic-release can read tags + commits since the
          # last release. persist-credentials:false hands credential control to
          # semantic-release (it uses GITHUB_TOKEN for the push).
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # semantic-release 25 requires Node ^22.14 || >=24.10.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ADR-15 Phase 5: auto-pin the catalog. Resolve the scripts repo's current
      # main SHA and export it as MASON_PINNED_REF, which esbuild bakes into the
      # bundle (pinnedRef.ts). Every later step — including semantic-release's
      # prepareCmd rebuild — inherits it via $GITHUB_ENV, so a release always
      # ships the latest reviewed catalog revision without a manual SHA bump.
      # Fail-safe: only export a valid 40-hex SHA; otherwise the build falls back
      # to the committed PINNED_REF_DEFAULT (never a placeholder).
      - name: Resolve catalog pin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CATALOG_REPO: MMoMM-org/markdown-mason-scripts
          CATALOG_BRANCH: main
        run: |
          REF="$(gh api "repos/${CATALOG_REPO}/commits/${CATALOG_BRANCH}" --jq '.sha' 2>/dev/null || true)"
          if [[ "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "MASON_PINNED_REF=$REF" >> "$GITHUB_ENV"
            echo "Pinned catalog ${CATALOG_REPO}@${CATALOG_BRANCH} -> $REF"
          else
            echo "::warning::Could not resolve catalog SHA for ${CATALOG_REPO}@${CATALOG_BRANCH}; falling back to committed PINNED_REF_DEFAULT"
          fi

      # Pre-release gates: fail fast before semantic-release does anything.
      - name: Type-check and build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check manifest
        run: npm run check:manifest

      - name: Test (includes compliance sweep)
        run: npm test

      # semantic-release reruns `node version-bump.mjs && npm run build` via its
      # exec prepareCmd, so main.js / manifest.json / styles.css on disk carry
      # the freshly-bumped version after this step.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # Attest the exact bytes semantic-release uploaded. If no release was cut
      # (chore/ci/docs commits), this still attests the pre-release build —
      # harmless, since nothing was published. Verify with:
      #   gh attestation verify main.js --owner MMoMM-org
      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json
