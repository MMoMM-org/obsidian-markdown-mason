name: Release

# Obsidian community plugin convention: version tags carry NO "v" prefix
# (e.g. "0.0.1", not "v0.0.1"). The release tag must exactly equal the
# `version` field in manifest.json.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. 0.0.1) — must match manifest.json version"
        required: true

# Required for:
#   contents: write   — create GitHub Release and upload assets
#   id-token: write   — OIDC token for build-provenance attestation
#   attestations: write — store the attestation via actions/attest-build-provenance
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check manifest
        run: npm run check:manifest

      - name: Test (includes compliance sweep)
        run: npm test

      # Resolve the release tag: prefer the git tag that triggered the push
      # event; fall back to the workflow_dispatch input.
      # INPUT_TAG is passed via env: to avoid interpolating an untrusted
      # workflow_dispatch input directly into shell source (CI shell-injection).
      # github.event_name is a GitHub-controlled enum — safe to inline.
      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${INPUT_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # Guard: the tag must exactly match manifest.json version.
      # TAG is passed via env: because steps.tag.outputs.tag derives from the
      # tainted workflow_dispatch input — never interpolate it directly in shell.
      - name: Verify tag matches manifest version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          MANIFEST_VERSION=$(node -e "process.stdout.write(require('./manifest.json').version)")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Tag '${TAG}' matches manifest version. Proceeding."

      # Attest build provenance for every release asset that ships in the plugin
      # bundle. Obsidian's review checks each uploaded asset for an attestation —
      # main.js (built by esbuild at the repo root) AND styles.css (tracked source
      # shipped verbatim). manifest.json is metadata, not a built artifact, so it
      # is not attested. subject-path takes a newline-separated list.
      - name: Attest build provenance for release assets
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      # Collect release assets. styles.css is optional — only upload if it
      # exists. softprops/action-gh-release expects a NEWLINE-separated list:
      # a single space-separated string is parsed as one glob and matches
      # nothing ("Pattern '...' does not match any files"), publishing an
      # asset-less release. Emit a multiline GITHUB_OUTPUT value instead.
      - name: Collect release assets
        id: assets
        run: |
          {
            echo "files<<EOF"
            echo "main.js"
            echo "manifest.json"
            [ -f styles.css ] && echo "styles.css"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Release ${{ steps.tag.outputs.tag }}

            Build provenance attestations are attached. Verify with:
            ```
            gh attestation verify main.js --repo ${{ github.repository }}
            gh attestation verify styles.css --repo ${{ github.repository }}
            ```
          files: ${{ steps.assets.outputs.files }}
          draft: false
          prerelease: false
