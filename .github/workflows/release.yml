name: Release

# Obsidian community plugin convention: version tags carry NO "v" prefix
# (e.g. "0.0.1", not "v0.0.1"). The release tag must exactly equal the
# `version` field in manifest.json.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. 0.0.1) — must match manifest.json version"
        required: true

# Required for:
#   contents: write   — create GitHub Release and upload assets
#   id-token: write   — OIDC token for build-provenance attestation
#   attestations: write — store the attestation via actions/attest-build-provenance
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check manifest
        run: npm run check:manifest

      - name: Test (includes compliance sweep)
        run: npm test

      # Resolve the release tag: prefer the git tag that triggered the push
      # event; fall back to the workflow_dispatch input.
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # Guard: the tag must exactly match manifest.json version.
      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -e "process.stdout.write(require('./manifest.json').version)")
          TAG="${{ steps.tag.outputs.tag }}"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Release tag '${TAG}' does not match manifest.json version '${MANIFEST_VERSION}'."
            echo "Update manifest.json (and versions.json) before tagging, or use the correct tag."
            exit 1
          fi
          echo "Tag '${TAG}' matches manifest version. Proceeding."

      # Attest build provenance for main.js.
      # Subject path must point to the built artifact at the repo root —
      # esbuild outputs main.js directly there (not into dist/).
      - name: Attest build provenance for main.js
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      # Collect release assets. styles.css is optional — only upload if it
      # exists (this plugin has no styles.css at v0.0.1).
      - name: Collect release assets
        id: assets
        run: |
          ASSETS="main.js manifest.json"
          if [ -f styles.css ]; then
            ASSETS="$ASSETS styles.css"
          fi
          echo "files=${ASSETS}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Release ${{ steps.tag.outputs.tag }}

            Build provenance attestation is attached. Verify with:
            ```
            gh attestation verify main.js --repo ${{ github.repository }}
            ```
          files: ${{ steps.assets.outputs.files }}
          draft: false
          prerelease: false
